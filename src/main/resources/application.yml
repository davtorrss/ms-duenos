server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/db_vetnova_duenos?useSSL=false&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
jjpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.vetnova.ms_duenos: INFO